services:
  - type: web
    name: rural-health-triage-backend
    runtime: python
    rootDir: backend-core
    plan: free
    region: singapore
    branch: main
    healthCheckPath: /api/health
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: EDGE_ROUTER_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY_1
        sync: false
      - key: ELEVENLABS_API_KEY_2
        sync: false
      - key: ELEVENLABS_API_KEY_3
        sync: false
      - key: BACKEND_API_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2